name: Build Flet APK
on:
  push:
    branches: [ main ] # سيعمل الأكشن عند الرفع على فرع main
  workflow_dispatch: # يتيح لك تشغيل الأكشن يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Flet and Dependencies
        run: |
          pip install flet
          pip install -r requirements.txt || true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # تأكد من استخدام نسخة متوافقة

      - name: Build APK
        run: |
          # أمر بناء الـ APK الخاص بـ flet
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-app-apk
          path: build/apk/*.apk
